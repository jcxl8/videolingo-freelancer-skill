name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile CLI
        run: python -m compileall -q scripts tests
      - name: Run Skill and CLI contracts
        run: python -m unittest discover -v tests
